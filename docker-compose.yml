services:
  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    expose:
      - "8000"
    volumes:
      - ./backend:/app
    networks:
      - app-network

  frontend:
    image: node:22.22.3-bookworm-slim
    working_dir: /app
    volumes:
      - ./frontend:/app
    expose:
      - "3000"
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 3000"
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
